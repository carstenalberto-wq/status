<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LagertÃ¦lling</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --surface2: #f2f1ee;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #9e9e99;
    --accent: #1a1a18;
    --danger: #c0392b;
    --warn-bg: #fef9ec;
    --warn-border: #f0c040;
    --warn-text: #7a5c00;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161614;
      --surface: #1f1f1d;
      --surface2: #2a2a27;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0efe9;
      --text2: #9e9e99;
      --text3: #6b6b66;
      --accent: #f0efe9;
      --warn-bg: #2a2408;
      --warn-border: #8a6c10;
      --warn-text: #e8c44a;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .app {
    max-width: 600px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  header {
    padding: 1.5rem 0 1.25rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.5rem;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 3px;
  }

  .session-row {
    display: grid;
    grid-template-columns: 1fr 140px;
    gap: 8px;
    margin-bottom: 1rem;
  }

  input[type="text"], input[type="date"], select, textarea {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    font-size: 14px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    outline: none;
    font-family: inherit;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus { border-color: var(--accent); }

  textarea {
    height: auto;
    min-height: 100px;
    padding: 10px 12px;
    resize: vertical;
    line-height: 1.6;
  }

  .mic-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    height: 72px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    transition: background 0.12s;
    margin-bottom: 10px;
    -webkit-tap-highlight-color: transparent;
  }

  .mic-btn:active { background: var(--surface2); }

  .mic-btn.recording {
    border-color: var(--danger);
    background: #fdf2f2;
    color: var(--danger);
  }

  @media (prefers-color-scheme: dark) {
    .mic-btn.recording { background: #2a1010; }
  }

  .mic-icon {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
  }

  .dot-anim {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--danger);
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .transcript-area {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text2);
    min-height: 64px;
    margin-bottom: 10px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    height: 40px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
    margin-bottom: 10px;
  }

  .btn:active { background: var(--surface2); }
  .btn.hidden { display: none; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
    margin: 1rem 0;
  }

  .stat {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }

  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
  .stat-val { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }

  .col-labels {
    display: grid;
    grid-template-columns: 1fr 72px 90px 28px;
    gap: 6px;
    padding: 0 0 6px;
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .item-list { display: flex; flex-direction: column; gap: 5px; }

  .item {
    display: grid;
    grid-template-columns: 1fr 72px 90px 28px;
    gap: 6px;
    align-items: center;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 10px;
  }

  .item.doubt {
    background: var(--warn-bg);
    border-color: var(--warn-border);
  }

  .item-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
  }

  .item-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
    line-height: 1.3;
  }

  .doubt-tag {
    display: inline-block;
    background: var(--warn-border);
    color: var(--warn-text);
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .item-qty-input {
    width: 100%;
    height: 30px;
    padding: 0 6px;
    font-size: 13px;
    text-align: center;
    border: 0.5px solid var(--border2);
    border-radius: 4px;
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    outline: none;
  }

  .item-value {
    font-size: 13px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  .item-del {
    background: none;
    border: none;
    font-size: 18px;
    color: var(--text3);
    cursor: pointer;
    text-align: center;
    line-height: 1;
    padding: 0;
  }

  .item-del:active { color: var(--danger); }

  .sep { height: 0.5px; background: var(--border); margin: 1.25rem 0; }

  .hist-toggle {
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    text-decoration: underline;
    text-align: right;
    display: block;
    margin-bottom: 8px;
  }

  .hist-item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 9px 0;
    border-bottom: 0.5px solid var(--border);
    color: var(--text);
  }

  .hist-item:last-child { border-bottom: none; }
  .hist-meta { font-size: 12px; color: var(--text2); }

  .status-msg {
    font-size: 12px;
    color: var(--text2);
    text-align: center;
    padding: 8px 0;
    min-height: 24px;
  }

  .section { margin-bottom: 1rem; }

  .manual-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 5px;
    display: block;
  }

  /* API Key Banner */
  .api-banner { background: #fffbe6; border: 1px solid #f0c040; border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .api-banner.saved { background: #e8f5e9; border-color: #4caf50; }
  .api-banner input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; font-family: monospace; }
  .api-banner button { padding: 8px 16px; background: #1a1a18; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .api-banner .api-label { font-size: 14px; color: #7a5c00; font-weight: 600; white-space: nowrap; }
  .api-banner.saved .api-label { color: #2e7d32; }
</style>
</head>

function norm(s) { return (s||'').toLowerCase().trim().replace(/\s+/g,' '); }

function findProduct(query) {
  const q = norm(query);
  if (ALIASES[q] === null) return { product: null, confidence: 'not_found' };
  const aliased = ALIASES[q] || q;
  const exact = PRODUCTS.find(p => norm(p.navn) === aliased);
  if (exact) return { product: exact, confidence: 'high' };
  const startsWith = PRODUCTS.filter(p => norm(p.navn).startsWith(aliased) || aliased.startsWith(norm(p.navn)));
  if (startsWith.length === 1) return { product: startsWith[0], confidence: 'high' };
  if (startsWith.length > 1) return { product: startsWith[0], confidence: 'doubt' };
  const words = aliased.split(' ').filter(w => w.length > 2);
  const wordMatch = PRODUCTS.filter(p => words.every(w => norm(p.navn).includes(w)));
  if (wordMatch.length === 1) return { product: wordMatch[0], confidence: 'high' };
  if (wordMatch.length > 1) return { product: wordMatch[0], confidence: 'doubt' };
  const any = PRODUCTS.find(p => norm(p.navn).includes(aliased) || aliased.includes(norm(p.navn)));
  if (any) return { product: any, confidence: 'doubt' };
  return { product: null, confidence: 'not_found' };
}

function parseLines(text) {
  return text.split('\n').map(l => l.trim()).filter(Boolean).reduce((acc, line) => {
    const m = line.match(/^(\d+[,.]?\d*)\s+(.+)$/);
    if (!m) return acc;
    const qty = parseFloat(m[1].replace(',','.'));
    const name = m[2].trim();
    const found = findProduct(name);
    acc.push({ qty, name, ...found });
    return acc;
  }, []);
}

async function toggleRecord() {
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = handleStop;
      mediaRecorder.start();
      isRecording = true;
      const btn = document.getElementById('micBtn');
      btn.classList.add('recording');
      document.getElementById('micIcon').innerHTML = '<div class="dot-anim"></div>';
      document.getElementById('micLabel').textContent = 'Optager â tryk for at stoppe';
      document.getElementById('transcriptArea').textContent = 'Optager...';
    } catch(e) {
      document.getElementById('transcriptArea').textContent = 'Mikrofon ikke tilgÃ¦ngelig. Brug manuel indtastning.';
    }
  } else {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    isRecording = false;
    const btn = document.getElementById('micBtn');
    btn.classList.remove('recording');
    document.getElementById('micIcon').innerHTML = '<svg width="18" height="20" viewBox="0 0 18 20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="1" width="8" height="11" rx="4" stroke="currentColor" stroke-width="1.5"/><path d="M1 9c0 4.4 3.6 8 8 8s8-3.6 8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="17" x2="9" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
    document.getElementById('micLabel').textContent = 'Tryk for at optÃ¦lle';
  }
}

async function handleStop() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  document.getElementById('transcriptArea').textContent = 'Transskriberer med AI...';
  try {
    const b64 = await blobToBase64(blob);
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': (sessionStorage.getItem('anthropic_key') || ''), 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: 'Transskriber denne lageroptÃ¦lling fra en bar. Returner KUN linjer i formatet:\n[antal] [produktnavn]\n\nBrug punktum som decimalseparator. Ignorer eventuel indledning med barens navn. Kun produktlinjer.' },
            { type: 'document', source: { type: 'base64', media_type: 'audio/webm', data: b64 } }
          ]
        }]
      })
    });
    const data = await resp.json();
    transcript = (data.content?.find(b => b.type === 'text')?.text || '').trim();
    document.getElementById('transcriptArea').textContent = transcript || 'Ingen tekst genkendt â prÃ¸v manuel indtastning';
    const analyseBtn = document.getElementById('analyseBtn');
    if (transcript) {
      analyseBtn.classList.remove('hidden');
    }
  } catch(e) {
    document.getElementById('transcriptArea').textContent = 'Fejl â brug manuel indtastning nedenfor';
  }
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

    div.innerHTML = `

}

function updateStats() {
  const total = items.reduce((s, it) => s + (it.product ? it.qty * it.product.pris : 0), 0);
  const doubts = items.filter(it => it.confidence !== 'high').length;
  document.getElementById('statCount').textContent = items.length;
  document.getElementById('statValue').textContent = Math.round(total).toLocaleString('da-DK') + ' kr';
  document.getElementById('statDoubt').textContent = doubts;
}

function updateQty(i, v) {

function removeItem(i) {

function saveSession() {
  const pl = document.getElementById('placering').value || 'Ukendt';
  const dt = document.getElementById('dato').value;
  const total = items.reduce((s, it) => s + (it.product ? it.qty * it.product.pris : 0), 0);
  sessions.unshift({
    dato: dt, placering: pl,
    total: Math.round(total),
    count: items.length,
    items: items.map(it => ({
      navn: it.product ? it.product.navn : it.name,
      stregkode: it.product ? it.product.stregkode : '',
      qty: it.qty,
      pris: it.product ? it.product.pris : 0,
      total: it.product ? parseFloat((it.qty * it.product.pris).toFixed(2)) : 0,
      doubt: it.confidence !== 'high'
    }))
  });
  localStorage.setItem('lager_v2', JSON.stringify(sessions));
  document.getElementById('statusMsg').textContent = 'â Gemt â ' + pl + ', ' + dt;
  document.getElementById('histSection').style.display = 'block';
  renderHistory();
  setTimeout(() => document.getElementById('statusMsg').textContent = '', 3000);
}

  const pl = document.getElementById('placering').value || 'Ukendt';

  let csv = '\uFEFFDato,Placering,Stregkode,Produkt,Antal,A pris,I alt,Tvivl\n';
  items.forEach(it => {
    const val = it.product ? (it.qty * it.product.pris).toFixed(2) : '';
    csv += [dt, pl, it.product ? it.product.stregkode : '', it.product ? it.product.navn : it.name, it.qty, it.product ? it.product.pris : '', val, it.confidence !== 'high' ? 'JA' : ''].join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `lager_${pl.replace(/\s+/g,'_')}_${dt}.csv`;
  a.click();
}
